name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-15
    environment: release
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Import signing certificate
      id: signing
      env:
        CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        if [ -z "${CERTIFICATE_P12:-}" ]; then
          echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
          echo "signed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "signed=true" >> "$GITHUB_OUTPUT"
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
        echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
        security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        version: '~> v2'
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    - name: Notarize macOS binaries
      if: steps.signing.outputs.signed == 'true'
      env:
        NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
        NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
        NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      run: |
        if [ -z "${NOTARY_API_KEY:-}" ]; then
          echo "::warning::NOTARY_API_KEY secret is not set. Skipping notarization."
          exit 0
        fi
        for ARCH in amd64 arm64; do
          BINARY="dist/*_darwin_${ARCH}/*"
          for f in $BINARY; do
            if [ -f "$f" ] && file "$f" | grep -q "Mach-O"; then
              echo "Notarizing $f..."
              ZIP_PATH="$RUNNER_TEMP/notarize_${ARCH}.zip"
              ditto -c -k --keepParent "$f" "$ZIP_PATH"
              xcrun notarytool submit "$ZIP_PATH" \
                --apple-id "${NOTARY_API_KEY_ID}" \
                --team-id "${NOTARY_API_ISSUER}" \
                --password "${NOTARY_API_KEY}" \
                --wait
              rm -f "$ZIP_PATH"
            fi
          done
        done

    - name: Clean up signing material
      if: always()
      run: |
        if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
        fi

  gui-release:
    name: GUI Release
    runs-on: macos-15
    needs: release
    environment: release
    permissions:
      contents: write
    steps:
    - name: Check out code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Determine version from tag
      id: version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

    - name: Import signing certificate
      id: signing
      env:
        CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        if [ -z "${CERTIFICATE_P12:-}" ]; then
          echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
          echo "signed=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "signed=true" >> "$GITHUB_OUTPUT"
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
        echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
        security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        TEAM_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*(\([A-Z0-9]*\))/\1/')
        echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
        echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

    - name: Install XcodeGen
      run: brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true

    - name: Set version in Info.plist
      run: |
        plutil -replace CFBundleShortVersionString "${{ steps.version.outputs.version }}" gui/Sources/Info.plist
        plutil -replace CFBundleVersion "${{ github.run_number }}" gui/Sources/Info.plist
        echo "Updated version to ${{ steps.version.outputs.version }}"

    - name: Generate Xcode project
      run: cd gui && xcodegen generate

    - name: Build and sign GUI app
      run: |
        cd gui
        if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
          xcodebuild -project SymairaMemory.xcodeproj \
            -scheme SymairaMemory \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES
        else
          echo "::warning::Building GUI without code signing"
          xcodebuild -project SymairaMemory.xcodeproj \
            -scheme SymairaMemory \
            -configuration Release \
            -derivedDataPath build
        fi
        # Locate the built app bundle
        APP_BUNDLE=$(find build -name 'SymairaMemory.app' -type d -maxdepth 4 | head -1)
        if [ -z "$APP_BUNDLE" ]; then
          echo "::error::App bundle not found after build"
          exit 1
        fi
        echo "APP_BUNDLE=$APP_BUNDLE" >> "$GITHUB_ENV"
        echo "Found app bundle: $APP_BUNDLE"

    - name: Prepare app bundle for notarization
      if: steps.signing.outputs.signed == 'true'
      id: notarize
      env:
        NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
        NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
        NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      run: |
        APP="${{ env.APP_BUNDLE }}"
        if [ -z "$APP" ] || [ ! -d "$APP" ]; then
          echo "::error::App bundle not found"
          exit 1
        fi
        echo "App bundle: $APP"
        # Zip the .app for notarization
        ZIP_PATH="$RUNNER_TEMP/SymairaMemory.zip"
        ditto -c -k --keepParent "$APP" "$ZIP_PATH"
        # Submit for notarization
        xcrun notarytool submit "$ZIP_PATH" \
          --apple-id "${NOTARY_API_KEY_ID}" \
          --team-id "${NOTARY_API_ISSUER}" \
          --password "${NOTARY_API_KEY}" \
          --wait
        # Staple the ticket
        xcrun stapler staple "$APP"
        echo "Notarization complete"

    - name: Create DMG
      id: dmg
      run: |
        APP="${{ env.APP_BUNDLE }}"
        if [ -z "$APP" ] || [ ! -d "$APP" ]; then
          echo "::error::App bundle not found for DMG creation"
          exit 1
        fi
        VERSION="${{ steps.version.outputs.version }}"
        DMG_PATH="$RUNNER_TEMP/SymairaMemory-$VERSION.dmg"
        # Determine app name from bundle
        APP_NAME=$(basename "$APP")
        DMG_VOLUME_NAME="SymairaMemory $VERSION"
        DMG_STAGING="$RUNNER_TEMP/dmg-staging"
        mkdir -p "$DMG_STAGING"
        cp -R "$APP" "$DMG_STAGING/"
        # Create DMG with hdiutil
        hdiutil create -volname "$DMG_VOLUME_NAME" \
          -srcfolder "$DMG_STAGING" \
          -ov -format UDZO \
          "$DMG_PATH"
        echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
        echo "dmg_name=SymairaMemory-$VERSION.dmg" >> "$GITHUB_OUTPUT"
        echo "Created DMG: $DMG_PATH"

    - name: Upload GUI app to release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        gh release upload "$TAG" "${{ steps.dmg.outputs.dmg_path }}" --clobber

    - name: Clean up signing material
      if: always()
      run: |
        if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
        fi
