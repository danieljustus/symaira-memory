name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: [1.26.x]

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Check formatting
      if: matrix.os == 'ubuntu-latest'
      run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

    - name: Vet
      if: matrix.os == 'ubuntu-latest'
      run: go vet ./...

    - name: Run tests
      run: go test -v ./...
