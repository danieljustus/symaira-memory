name: SymairaMemory
options:
  bundleIdPrefix: com.symaira

packages:
  SymairaAppKit:
    url: https://github.com/danieljustus/symaira-appkit
    exactVersion: 0.1.0

targets:
  SymairaMemory:
    type: application
    platform: macOS
    # 13.0 → 14.0: required by the shared symaira-appkit package and the
    # ecosystem-wide client baseline (all other clients already target 14).
    deploymentTarget: "14.0"
    dependencies:
      - package: SymairaAppKit
        product: SymairaTheme
      - package: SymairaAppKit
        product: SymairaKeychain
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleIdentifier: com.symaira.SymairaMemory
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        SWIFT_VERSION: "5.9"
