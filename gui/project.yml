name: SymairaMemory
options:
  bundleIdPrefix: com.symaira
targets:
  SymairaMemory:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleIdentifier: com.symaira.SymairaMemory
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        SWIFT_VERSION: "5.9"
